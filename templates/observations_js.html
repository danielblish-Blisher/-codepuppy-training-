<!-- ====== OBSERVATIONS JS ====== -->
<!-- Uses pre-aggregated OBS_STATS, OBS_GROUPS, OBS_TREND + OBS_ROWS (500 recent) -->
<script>
let _obsChartGroups=null, _obsChartTrend=null;

function render_observations() {
  const srFilt  = document.getElementById('obs-sr-filter')?.value||'';
  const grpFilt = document.getElementById('obs-group-filter')?.value||'';

  // Populate filters once
  const srSel  = document.getElementById('obs-sr-filter');
  const grpSel = document.getElementById('obs-group-filter');
  if(srSel && srSel.options.length<=1) {
    (OBS_SR_LIST||[]).forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;srSel.appendChild(o);});
  }
  if(grpSel && grpSel.options.length<=1) {
    (OBS_GROUP_LIST||[]).forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g;grpSel.appendChild(o);});
  }

  // Filter OBS_ROWS for the table (already compact)
  const rows = (OBS_ROWS||[]).filter(o => {
    if(srFilt  && o.FM_Sr_Director !== srFilt)  return false;
    if(grpFilt && o.Question_group  !== grpFilt) return false;
    return true;
  });

  _renderObsKpis();
  _renderObsGroupChart();
  _renderObsTrendChart();
  _renderObsTable(rows);
}

function _renderObsKpis() {
  const s = OBS_STATS || {};
  document.getElementById('obs-kpis').innerHTML = [
    {label:'Observations',    val:fmt(s.total||0),  sub:'total records',      color:'text-wmt-blue'},
    {label:'Techs Observed',  val:fmt(s.techs||0),  sub:'unique technicians',  color:'text-wmt-blue'},
    {label:'Stores Covered',  val:fmt(s.stores||0), sub:'unique stores',       color:'text-wmt-blue'},
    {label:'Question Groups', val:fmt(s.groups||0), sub:'skill categories',    color:'text-wmt-blue'},
  ].map(c=>`<div class="kpi-card bg-white rounded-xl shadow p-4">
    <div class="text-xs text-wmt-gray100 mb-1">${c.label}</div>
    <div class="text-2xl font-black ${c.color}">${c.val}</div>
    <div class="text-xs text-wmt-gray100 mt-1">${c.sub}</div>
  </div>`).join('');
}

function _renderObsGroupChart() {
  // Use pre-aggregated OBS_GROUPS
  const top = (OBS_GROUPS||[]).slice(0,12);
  const ctx = document.getElementById('chart-obs-groups')?.getContext('2d');
  if(!ctx) return;
  if(_obsChartGroups) _obsChartGroups.destroy();
  _obsChartGroups = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: top.map(g=>g.group.length>28?g.group.slice(0,28)+'…':g.group),
      datasets:[{label:'Observations',data:top.map(g=>g.count),backgroundColor:'#0053e2',borderRadius:4}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:10}},grid:{color:'#f0f0f0'}},y:{ticks:{font:{size:9}}}}
    }
  });
}

function _renderObsTrendChart() {
  // Use pre-aggregated OBS_TREND
  const trend  = OBS_TREND || [];
  const labels = trend.map(t=>t.key);
  const data   = trend.map(t=>t.count);
  const ctx = document.getElementById('chart-obs-trend')?.getContext('2d');
  if(!ctx) return;
  if(_obsChartTrend) _obsChartTrend.destroy();
  _obsChartTrend = new Chart(ctx, {
    type: 'bar',
    data: {labels, datasets:[{label:'Observations',data,backgroundColor:'#ffc220',borderRadius:3}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{ticks:{font:{size:10}},grid:{color:'#f0f0f0'}},
        x:{ticks:{font:{size:8},maxRotation:45}}
      }
    }
  });
}

function _renderObsTable(rows) {
  const tbody = document.getElementById('obs-table-body');
  if(!tbody) return;
  tbody.innerHTML = rows.slice(0,200).map((o,i)=>`
    <tr class="hover:bg-wmt-gray10 ${i%2===0?'':'bg-gray-50/50'}">
      <td class="px-3 py-2 whitespace-nowrap">${o.Date||'—'}</td>
      <td class="px-3 py-2">${o.tech_name||'—'}</td>
      <td class="px-3 py-2 text-wmt-gray100">${o.Org_Role||'—'}</td>
      <td class="px-3 py-2 font-mono">${o.Store||'—'}</td>
      <td class="px-3 py-2">${o.FM_Sr_Director||'—'}</td>
      <td class="px-3 py-2">${o.Direct_Manager||'—'}</td>
      <td class="px-3 py-2">${o.Question_group||'—'}</td>
      <td class="px-3 py-2 max-w-[200px] truncate" title="${o.question||''}">${(o.question||'—').slice(0,60)}</td>
      <td class="px-3 py-2">${o.answer||'—'}</td>
      <td class="px-3 py-2">${o.status||'—'}</td>
    </tr>`).join('');
}

function exportObsTable() {
  // Export aggregated groups + trend (raw rows not stored)
  const hdr = 'Question Group,Total Observations\n';
  const csv = hdr + (OBS_GROUPS||[]).map(g=>`${g.group},${g.count}`).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'hvacr_field_observations_summary.csv';
  a.click();
}
</script>
