<!-- ====== FIELD OBSERVATIONS TAB ====== -->
<div id="tab-observations" class="tab-panel">
  <div class="max-w-screen-2xl mx-auto px-4 py-5 space-y-6">

    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4" id="obs-kpis"></div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white rounded-xl shadow p-4">
        <h2 class="font-semibold text-sm mb-3">Observations by Question Group</h2>
        <div style="height:280px;"><canvas id="chart-obs-groups"></canvas></div>
      </div>
      <div class="bg-white rounded-xl shadow p-4">
        <h2 class="font-semibold text-sm mb-3">Observation Volume by Fiscal Week</h2>
        <div style="height:280px;"><canvas id="chart-obs-trend"></canvas></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl shadow p-4 flex flex-wrap gap-3 items-end">
      <div>
        <label class="text-xs text-wmt-gray100 block mb-1">Sr Director</label>
        <select id="obs-sr-filter" onchange="render_observations()"
                class="text-xs border rounded px-2 py-1.5 min-w-[160px]">
          <option value="">All</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-wmt-gray100 block mb-1">Question Group</label>
        <select id="obs-group-filter" onchange="render_observations()"
                class="text-xs border rounded px-2 py-1.5 min-w-[160px]">
          <option value="">All Groups</option>
        </select>
      </div>
      <button onclick="exportObsTable()" class="text-xs bg-wmt-blue text-white rounded px-3 py-1.5">↓ CSV</button>
    </div>

    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div class="px-4 py-3 border-b border-gray-100">
        <h2 class="font-semibold text-sm">Field Observation Detail</h2>
      </div>
      <div class="overflow-auto max-h-96">
        <table class="w-full text-xs sticky-head">
          <thead class="bg-wmt-gray10 text-wmt-gray100 font-semibold">
            <tr>
              <th class="px-3 py-2 text-left">Date</th>
              <th class="px-3 py-2 text-left">Technician</th>
              <th class="px-3 py-2 text-left">Role</th>
              <th class="px-3 py-2 text-left">Store</th>
              <th class="px-3 py-2 text-left">Sr Director</th>
              <th class="px-3 py-2 text-left">Manager</th>
              <th class="px-3 py-2 text-left">Group</th>
              <th class="px-3 py-2 text-left">Question</th>
              <th class="px-3 py-2 text-left">Answer</th>
              <th class="px-3 py-2 text-left">Status</th>
            </tr>
          </thead>
          <tbody id="obs-table-body" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
