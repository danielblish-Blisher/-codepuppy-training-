<!-- ====== EPA CERTS TAB ====== -->
<div id="tab-epa" class="tab-panel">
  <div class="max-w-screen-2xl mx-auto px-4 py-5 space-y-6">

    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4" id="epa-kpis"></div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white rounded-xl shadow p-4">
        <h2 class="font-semibold text-sm mb-3">Cert Status Breakdown</h2>
        <div style="height:260px;"><canvas id="chart-epa-status"></canvas></div>
      </div>
      <div class="bg-white rounded-xl shadow p-4">
        <h2 class="font-semibold text-sm mb-3">License Type Distribution</h2>
        <div style="height:260px;"><canvas id="chart-epa-types"></canvas></div>
      </div>
    </div>

    <!-- Expiring Soon alert -->
    <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
      <h2 class="font-semibold text-sm text-yellow-700 mb-2">⚠️ Expiring Within 90 Days</h2>
      <div id="epa-expiring-list" class="text-xs text-wmt-gray160 space-y-1"></div>
    </div>

    <!-- Filters + table -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
        <h2 class="font-semibold text-sm">EPA Certification Registry</h2>
        <button onclick="exportEpaTable()" class="text-xs bg-wmt-blue text-white rounded px-2 py-1">↓ CSV</button>
      </div>
      <div class="overflow-auto max-h-[500px]">
        <table class="w-full text-xs sticky-head">
          <thead class="bg-wmt-gray10 text-wmt-gray100 font-semibold">
            <tr>
              <th class="px-3 py-2 text-left">Name</th>
              <th class="px-3 py-2 text-left">Role</th>
              <th class="px-3 py-2 text-left">Status</th>
              <th class="px-3 py-2 text-left">License Category</th>
              <th class="px-3 py-2 text-left">License Type</th>
              <th class="px-3 py-2 text-left">License #</th>
              <th class="px-3 py-2 text-right">Issue Date</th>
              <th class="px-3 py-2 text-right">Expiry Date</th>
              <th class="px-3 py-2 text-right">Verified</th>
              <th class="px-3 py-2 text-right">Cert Status</th>
            </tr>
          </thead>
          <tbody id="epa-table-body" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
