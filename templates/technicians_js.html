<!-- ====== TECHNICIANS JS ====== -->
<script>
let _techData = null;
let _techLevelChart = null;
let _examTypeChart  = null;

function _buildTechData() {
  if (_techData) return _techData;

  // ── EPA validity lookup (by user_id, lowercased)
  const today = new Date();
  const epaByUid = {};  // uid -> { valid, expiry }
  (EPA_CERTS||[]).forEach(c => {
    const uid = String(c.user_id||'').toLowerCase().trim();
    if (!uid) return;
    const exp = c.expiry_date ? new Date(c.expiry_date) : null;
    const valid = exp && exp > today;
    if (!epaByUid[uid] || valid) epaByUid[uid] = { valid, expiry: c.expiry_date };
  });
  const epaByName = {};
  (EPA_CERTS||[]).forEach(c => {
    const name = (c.full_name||'').toLowerCase().trim();
    if (!name) return;
    const exp = c.expiry_date ? new Date(c.expiry_date) : null;
    const valid = exp && exp > today;
    if (!epaByName[name] || valid) epaByName[name] = { valid, expiry: c.expiry_date };
  });

  // ── Org hierarchy from TECH_STORES (user_id -> { sr, dir, rm })
  const orgByUid = {};
  (TECH_STORES||[]).forEach(ts => {
    const uid = String(ts.user_id||'').toLowerCase().trim();
    if (!uid || orgByUid[uid]) return;
    orgByUid[uid] = {
      sr:  ts.sr_director||'',
      dir: ts.director||'',
      rm:  ts.rm||'',
    };
  });

  // ── Latest exam per student (by student_id)
  const examByStudentId = {};
  (EXAM_REG||[]).forEach(e => {
    const sid = String(e.student_id||e.student_name||'').toLowerCase().trim();
    if (!sid) return;
    const existing = examByStudentId[sid];
    if (!existing || (e.Testing_Date||'') > (existing.Testing_Date||'')) {
      examByStudentId[sid] = e;
    }
  });
  // Also index by name for fuzzy join
  const examByName = {};
  Object.values(examByStudentId).forEach(e => {
    const name = (e.student_name||'').toLowerCase().trim();
    if (name) examByName[name] = e;
  });

  // ── Assemble tech rows from TECH_ALIGNMENT
  _techData = (TECH_ALIGNMENT||[]).map(t => {
    const uid  = String(t.user_id||'').toLowerCase().trim();
    const name = `${t.first_name||''} ${t.last_name||''}`.toLowerCase().trim();
    const org  = orgByUid[uid] || {};

    // Join exam
    const exam = examByStudentId[uid] || examByName[name] || null;

    // EPA
    const epa = epaByUid[uid] || epaByName[name] || null;

    return {
      uid, name: `${t.first_name} ${t.last_name}`,
      level: t.technician_level||'',
      role:  t.org_role||'',
      home_store: t.home_store||'',
      mgr:   `${t.mgr_first_name||''} ${t.mgr_last_name||''}`.trim(),
      sr:    org.sr, dir: org.dir, rm: org.rm,
      exam_date:   exam?.Testing_Date||null,
      exam_score:  exam?.Score||null,
      exam_result: exam?.Result||null,
      exam_type:   exam?.test_type||null,
      exam_attempts: exam?.attempt||null,
      epa_valid:   epa?.valid ?? null,
      epa_expiry:  epa?.expiry||null,
    };
  });
  return _techData;
}

function render_technicians() {
  _techData = null;
  const techs  = _buildTechData();
  const f      = ORG_FILTERS;
  const lvlFilt = document.getElementById('tech-level-filter')?.value||'';
  const exFilt  = document.getElementById('tech-exam-filter')?.value||'';

  // Populate level/exam filters once
  const lvls = [...new Set(techs.map(t=>t.level).filter(Boolean))].sort();
  const lvlSel = document.getElementById('tech-level-filter');
  if (lvlSel && lvlSel.options.length <= 1)
    lvls.forEach(l => { const o=document.createElement('option'); o.value=l; o.textContent=l; lvlSel.appendChild(o); });

  // Apply org slicer + tab-local filters
  let filtered = filterByOrg(techs, { sr:'sr', dir:'dir', rm:'rm', mgr:'mgr', tech:'name' })
    .filter(t => !lvlFilt || t.level === lvlFilt)
    .filter(t => {
      if (!exFilt) return true;
      if (exFilt==='pass') return (t.exam_result||'').toLowerCase().includes('pass');
      if (exFilt==='fail') return (t.exam_result||'').toLowerCase().includes('fail');
      if (exFilt==='none') return !t.exam_result;
      return true;
    });

  _renderLevelChart(filtered);
  _renderExamTypeChart(filtered);
  _renderTechKpis(techs, filtered);
  _renderTechTable(filtered);
  _renderHighRisk(techs);
}

function _renderTechKpis(all, filtered) {
  const total   = filtered.length;
  const hasPassed = filtered.filter(t=>(t.exam_result||'').toLowerCase().includes('pass')).length;
  const hasFailed = filtered.filter(t=>(t.exam_result||'').toLowerCase().includes('fail')).length;
  const noExam  = filtered.filter(t=>!t.exam_result).length;
  const epaOk   = filtered.filter(t=>t.epa_valid===true).length;
  const cards = [
    { label:'Total Active Techs', val:fmt(total),    sub:'in filter', color:'text-wmt-blue' },
    { label:'Exam Pass',          val:fmt(hasPassed), sub:pct(total?hasPassed/total*100:0), color:'text-green-700' },
    { label:'Exam Fail / No Exam',val:fmt(hasFailed+noExam), sub:`${fmt(hasFailed)} fail · ${fmt(noExam)} no record`, color:(hasFailed+noExam)>0?'text-wmt-red':'text-green-700' },
    { label:'EPA Cert Valid',     val:fmt(epaOk),     sub:pct(total?epaOk/total*100:0), color:epaOk/total<0.9?'text-wmt-red':'text-green-700' },
  ];
  document.getElementById('tech-kpis').innerHTML = cards.map(c=>`
    <div class="kpi-card bg-white rounded-xl shadow p-4">
      <div class="text-xs text-wmt-gray100 mb-1">${c.label}</div>
      <div class="text-2xl font-black ${c.color}">${c.val}</div>
      <div class="text-xs text-wmt-gray100 mt-1">${c.sub}</div>
    </div>`).join('');
  document.getElementById('tech-count-label').textContent = `${fmt(total)} techs`;
}

function _renderLevelChart(techs) {
  const levelCounts = {};
  techs.forEach(t => { const l=t.level||'Unknown'; levelCounts[l]=(levelCounts[l]||0)+1; });
  const labels = Object.keys(levelCounts).sort();
  const data   = labels.map(l=>levelCounts[l]);
  const colors = ['#0053e2','#ffc220','#2a8703','#ea1100','#919191','#00b0c8'];
  const ctx = document.getElementById('chart-tech-levels')?.getContext('2d');
  if (!ctx) return;
  if (_techLevelChart) _techLevelChart.destroy();
  _techLevelChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ label:'Techs', data, backgroundColor:colors, borderRadius:4 }] },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        y:{ ticks:{font:{size:10}}, grid:{color:'#f0f0f0'} },
        x:{ ticks:{font:{size:9}} }
      }
    }
  });
}

function _renderExamTypeChart(techs) {
  const typeCounts = { pass:{}, fail:{} };
  techs.forEach(t => {
    const tp = t.exam_type||'Unknown';
    const res = (t.exam_result||'').toLowerCase();
    if (res.includes('pass')) typeCounts.pass[tp]=(typeCounts.pass[tp]||0)+1;
    else if (res.includes('fail')) typeCounts.fail[tp]=(typeCounts.fail[tp]||0)+1;
  });
  const labels = [...new Set([
    ...Object.keys(typeCounts.pass),
    ...Object.keys(typeCounts.fail)
  ])].sort();
  const ctx = document.getElementById('chart-exam-by-type')?.getContext('2d');
  if (!ctx) return;
  if (_examTypeChart) _examTypeChart.destroy();
  _examTypeChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Pass', data:labels.map(l=>typeCounts.pass[l]||0), backgroundColor:'#2a8703', borderRadius:4 },
        { label:'Fail', data:labels.map(l=>typeCounts.fail[l]||0), backgroundColor:'#ea1100', borderRadius:4 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'top', labels:{font:{size:10}} } },
      scales:{
        x:{ stacked:false, ticks:{font:{size:8}, maxRotation:45} },
        y:{ ticks:{font:{size:10}}, grid:{color:'#f0f0f0'} }
      }
    }
  });
}

function _renderTechTable(techs) {
  const sorted = [...techs].sort((a,b) => {
    // Failures first, then no-exam, then passes
    const rank = t => (t.exam_result||'').toLowerCase().includes('fail') ? 0 :
      !t.exam_result ? 1 : 2;
    return rank(a) - rank(b);
  });
  const tbody = document.getElementById('tech-table-body');
  if (!tbody) return;
  tbody.innerHTML = sorted.slice(0, 200).map((t,i) => {
    const res = (t.exam_result||'').toLowerCase();
    const resHtml = res.includes('pass')
      ? `<span class="score-low rounded px-2 py-0.5 font-bold">PASS</span>`
      : res.includes('fail')
      ? `<span class="score-high rounded px-2 py-0.5 font-bold">FAIL</span>`
      : `<span class="score-none rounded px-2 py-0.5">None</span>`;
    const epaHtml = t.epa_valid===true
      ? `<span class="score-low rounded px-2 py-0.5">✓ Valid</span>`
      : t.epa_valid===false
      ? `<span class="score-high rounded px-2 py-0.5">⚠ Exp</span>`
      : `<span class="score-none rounded px-2 py-0.5">—</span>`;
    return `<tr class="hover:bg-wmt-gray10 ${i%2===0?'':'bg-gray-50/50'}">
      <td class="px-3 py-2 font-medium">${t.name}</td>
      <td class="px-3 py-2">${t.level||'—'}</td>
      <td class="px-3 py-2 text-wmt-gray100">${t.role||'—'}</td>
      <td class="px-3 py-2 font-mono">${t.home_store||'—'}</td>
      <td class="px-3 py-2">${t.sr||'—'}</td>
      <td class="px-3 py-2 text-right text-wmt-gray100">${t.exam_date||'—'}</td>
      <td class="px-3 py-2 text-right">${t.exam_score!=null?t.exam_score:'—'}</td>
      <td class="px-3 py-2 text-right">${resHtml}</td>
      <td class="px-3 py-2 text-right">${t.exam_attempts||'—'}</td>
      <td class="px-3 py-2 text-right">${epaHtml}</td>
    </tr>`;
  }).join('');
}

function _renderHighRisk(techs) {
  const risky = techs.filter(t => {
    const res = (t.exam_result||'').toLowerCase();
    return res.includes('fail') || !t.exam_result;
  }).slice(0, 50);
  const tbody = document.getElementById('high-risk-tech-body');
  if (!tbody) return;
  tbody.innerHTML = risky.map((t,i) => {
    const issue = (t.exam_result||'').toLowerCase().includes('fail')
      ? `<span class="score-high rounded px-2 py-0.5 font-bold">Failed Exam</span>`
      : `<span class="score-none rounded px-2 py-0.5">No Exam Record</span>`;
    return `<tr class="hover:bg-red-50/50">
      <td class="px-3 py-2 font-medium">${t.name}</td>
      <td class="px-3 py-2">${t.level||'—'}</td>
      <td class="px-3 py-2 font-mono">${t.home_store||'—'}</td>
      <td class="px-3 py-2">${t.mgr||'—'}</td>
      <td class="px-3 py-2 text-right">${issue}</td>
    </tr>`;
  }).join('');
}

function exportTechTable() {
  const techs = _buildTechData();
  const hdr = 'Name,Level,Role,Home Store,Sr Director,Director,Exam Date,Score,Result,Attempts,EPA Valid\n';
  const csv = hdr + techs.map(t=>[
    t.name, t.level, t.role, t.home_store, t.sr, t.dir,
    t.exam_date||'', t.exam_score||'', t.exam_result||'', t.exam_attempts||'',
    t.epa_valid!=null?t.epa_valid:''
  ].join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='hvacr_tech_training_status.csv';
  a.click();
}
</script>
