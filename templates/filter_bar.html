<!-- ====== ORG FILTER BAR (shared slicer for Technicians / WO / Observations / Refrigerant) ====== -->
<div id="org-filter-bar" class="hidden bg-gray-50 border-b border-gray-200 shadow-sm">
  <div class="max-w-screen-2xl mx-auto px-4 py-2 flex flex-wrap items-center gap-2">

    <!-- Label -->
    <span class="text-xs font-semibold text-wmt-gray100 shrink-0 mr-1">Filter:</span>

    <!-- Sr Director -->
    <select id="flt-sr"
            onchange="onOrgFilterChange('sr')"
            class="flt-select text-xs rounded border border-gray-300 px-2 py-1
                   bg-white text-wmt-gray160 focus:border-wmt-blue focus:outline-none
                   min-w-[140px] max-w-[180px]">
      <option value="">All Sr Directors</option>
    </select>

    <span class="text-gray-300 text-xs">›</span>

    <!-- Director -->
    <select id="flt-dir"
            onchange="onOrgFilterChange('dir')"
            class="flt-select text-xs rounded border border-gray-300 px-2 py-1
                   bg-white text-wmt-gray160 focus:border-wmt-blue focus:outline-none
                   min-w-[130px] max-w-[170px]">
      <option value="">All Directors</option>
    </select>

    <span class="text-gray-300 text-xs">›</span>

    <!-- Regional Mgr -->
    <select id="flt-rm"
            onchange="onOrgFilterChange('rm')"
            class="flt-select text-xs rounded border border-gray-300 px-2 py-1
                   bg-white text-wmt-gray160 focus:border-wmt-blue focus:outline-none
                   min-w-[130px] max-w-[170px]">
      <option value="">All Regional Mgrs</option>
    </select>

    <span class="text-gray-300 text-xs">›</span>

    <!-- FS Manager -->
    <select id="flt-mgr"
            onchange="onOrgFilterChange('mgr')"
            class="flt-select text-xs rounded border border-gray-300 px-2 py-1
                   bg-white text-wmt-gray160 focus:border-wmt-blue focus:outline-none
                   min-w-[130px] max-w-[170px]">
      <option value="">All FS Managers</option>
    </select>

    <span class="text-gray-300 text-xs">›</span>

    <!-- Technician -->
    <select id="flt-tech"
            onchange="onOrgFilterChange('tech')"
            class="flt-select text-xs rounded border border-gray-300 px-2 py-1
                   bg-white text-wmt-gray160 focus:border-wmt-blue focus:outline-none
                   min-w-[130px] max-w-[170px]">
      <option value="">All Technicians</option>
    </select>

    <!-- Active count badge + Clear -->
    <span id="flt-active-count"
          class="hidden text-xs font-bold bg-wmt-blue text-white rounded-full
                 w-5 h-5 flex items-center justify-center shrink-0">
    </span>

    <button onclick="clearOrgFilters()"
            class="text-xs px-3 py-1 rounded bg-wmt-spark text-wmt-gray160
                   font-semibold hover:bg-yellow-400 transition-colors shrink-0 ml-auto">
      Clear All
    </button>

  </div>
</div>
