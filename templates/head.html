<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js inlined at build time by build_dashboard.py -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wmt: {
              blue:    '#0053e2',
              spark:   '#ffc220',
              red:     '#ea1100',
              green:   '#2a8703',
              warn:    '#995213',
              warnbg:  '#fff8ec',
              gray10:  '#f5f5f5',
              gray50:  '#c2c2c2',
              gray100: '#919191',
              gray160: '#2e2f32',
            }
          }
        }
      }
    };
  </script>
  <style>
    /* Slim scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #c2c2c2; border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Tab active state */
    .tab-btn.active {
      border-bottom: 3px solid #0053e2;
      color: #0053e2;
      font-weight: 600;
    }
    /* Score pill colours */
    .score-high  { background:#fde8e7; color:#ea1100; }
    .score-med   { background:#fff8ec; color:#995213; }
    .score-low   { background:#e8f5e0; color:#2a8703; }
    .score-none  { background:#f5f5f5; color:#919191; }

    /* Card hover lift */
    .kpi-card { transition: transform .15s, box-shadow .15s; }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }

    /* Info icon + tooltip */
    .info-wrap { position: relative; display: inline-flex; align-items: center; }
    .info-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border-radius: 50%;
      background: #0053e2; color: #fff;
      font-size: 9px; font-weight: 800; line-height: 1;
      cursor: pointer; margin-left: 5px; flex-shrink: 0;
      border: none; padding: 0; vertical-align: middle;
    }
    .info-icon:hover { background: #003da8; }
    .info-tip {
      display: none;
      position: absolute; top: calc(100% + 8px); left: 0;
      width: 270px;
      background: #1e293b; color: #f1f5f9;
      font-size: 11px; line-height: 1.55;
      border-radius: 8px; padding: 10px 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      z-index: 9999; pointer-events: none;
      white-space: normal; text-align: left;
    }
    /* caret — points UP toward the icon */
    .info-tip::after {
      content: '';
      position: absolute; bottom: 100%; left: 14px;
      border: 6px solid transparent;
      border-bottom-color: #1e293b;
    }
    .info-wrap:hover .info-tip,
    .info-icon:focus + .info-tip { display: block; }
    .info-tip b { color: #ffc220; }

    /* Sticky table headers */
    .sticky-head th { position: sticky; top: 0; z-index: 10; }

    /* Banner fade */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body class="bg-wmt-gray10 text-wmt-gray160 font-sans antialiased">

<!-- Global state -->
<script>
  // ── Visible error trap (remove before final publish) ──────────────────
  window.addEventListener('error', e => {
    let box = document.getElementById('_err_box');
    if (!box) {
      box = document.createElement('div');
      box.id = '_err_box';
      box.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#ea1100;color:#fff;font:12px/1.4 monospace;padding:8px 12px;max-height:35vh;overflow:auto;';
      document.body.appendChild(box);
    }
    box.innerHTML += `<div>❌ ${e.message} @ ${e.filename?.split('/').pop()}:${e.lineno}</div>`;
  });
  window.addEventListener('unhandledrejection', e => {
    let box = document.getElementById('_err_box');
    if (!box) { box = document.createElement('div'); box.id='_err_box'; box.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#ea1100;color:#fff;font:12px/1.4 monospace;padding:8px 12px;max-height:35vh;overflow:auto;'; document.body.appendChild(box); }
    box.innerHTML += `<div>❌ Unhandled: ${e.reason}</div>`;
  });
  // Banner filter: 'all' | 'walmart' | 'sams'
  let BANNER_FILTER = 'all';
  // Active tab
  let ACTIVE_TAB = 'overview';

  function setTab(id) {
    ACTIVE_TAB = id;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === id);
    });
    document.querySelectorAll('.tab-panel').forEach(p => {
      p.classList.toggle('active', p.id === 'tab-' + id);
    });
    // Notify each tab's render function after browser has re-flowed layout
    const fn = window['render_' + id];
    if (typeof fn === 'function') requestAnimationFrame(fn);
  }

  function setBanner(v) {
    BANNER_FILTER = v;
    document.querySelectorAll('.banner-btn').forEach(b => {
      b.classList.toggle('bg-wmt-blue', b.dataset.banner === v);
      b.classList.toggle('text-white', b.dataset.banner === v);
      b.classList.toggle('bg-white', b.dataset.banner !== v);
      b.classList.toggle('text-wmt-gray160', b.dataset.banner !== v);
    });
    // Re-render active tab
    const fn = window['render_' + ACTIVE_TAB];
    if (typeof fn === 'function') fn();
  }

  // Utility: format numbers
  function fmt(n, dec=0) {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toLocaleString('en-US', {minimumFractionDigits:dec, maximumFractionDigits:dec});
  }
  function pct(n, dec=1) {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toFixed(dec) + '%';
  }
  function scorePill(score) {
    if (score == null || isNaN(score)) return `<span class="score-none rounded px-2 py-0.5 text-xs font-bold">N/A</span>`;
    const cls = score >= 70 ? 'score-high' : score >= 40 ? 'score-med' : 'score-low';
    return `<span class="${cls} rounded px-2 py-0.5 text-xs font-bold">${Math.round(score)}</span>`;
  }
</script>
